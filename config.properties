# ===================================================
# Quanlykhachsan - Server Configuration
# ===================================================
#
# AUTO-FALLBACK: Nếu server.url không kết nối được,
#               ứng dụng tự động chuyển về localhost:8080.
#               Không cần sửa file thủ công khi server remote bị tắt.
#
# --- Chế độ REMOTE (ngrok / Railway / Render / VPS / ...) ---
# Uncomment dòng dưới và thay bằng URL server thực tế của bạn:
server.url=https://washable-martine-nonvicariously.ngrok-free.dev/api

# --- Chế độ LOCAL (mặc định) ---
# server.url=http://localhost:8080/api

# --- Google OAuth2 Configuration ---
# Hướng dẫn: Để bảo mật, hãy đặt các giá trị này vào Biến môi trường của hệ điều hành (Environment Variables)
# GOOGLE_CLIENT_ID=...
# GOOGLE_CLIENT_SECRET=...
# GOOGLE_REDIRECT_URI=http://localhost:8080/api/auth/google/callback

google.client_id=YOUR_CLIENT_ID_HERE
google.client_secret=YOUR_CLIENT_SECRET_HERE
google.redirect_uri=http://localhost:8080/api/auth/google/callback
